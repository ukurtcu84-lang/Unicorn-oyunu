    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; touch-action: none; user-select: none; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf2f8; /* Açık pembe arkaplan - Asla siyah olmaz */
        }
        
        /* 2.5D Oyun Alanı */
        #gameArea {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
            perspective: 800px;
        }

        /* Zemin Izgarası (Derinlik hissi için) */
        .floor-grid {
            position: absolute;
            top: 50%; left: 50%;
            width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.4) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255,255,255,0.4) 2px, transparent 2px);
            background-size: 60px 60px;
            transform: translate(-50%, -50%) rotateX(60deg);
            transform-origin: center center;
            pointer-events: none;
        }

        /* Nesneler ve Karakterler */
        .sprite {
            position: absolute;
            transform: translate(-50%, -100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: top 0.1s linear, left 0.1s linear;
            z-index: 10;
        }

        .shadow {
            width: 80%;
            height: 15px;
            background: rgba(0,0,0,0.15);
            border-radius: 50%;
            position: absolute;
            bottom: -5px;
            z-index: -1;
        }

        .emoji-art {
            font-size: 60px;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
            transition: transform 0.2s;
        }

        /* Yürüme Animasyonu */
        @keyframes walk {
            0% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0) rotate(-5deg); }
        }
        .walking .emoji-art { animation: walk 0.3s infinite; }

        /* Uyuma Animasyonu */
        .sleeping .emoji-art { transform: rotate(90deg) scale(0.8); opacity: 0.8; }

        /* Arayüz (UI) */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: env(safe-area-inset-top, 20px) 15px env(safe-area-inset-bottom, 20px) 15px;
        }

        .ui-element { pointer-events: auto; }
        
        .glass-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        /* Joystick */
        #joy-base {
            position: absolute; bottom: 30px; left: 30px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.4); border-radius: 50%;
            border: 2px solid white; display: flex; justify-content: center; align-items: center;
        }
        #joy-stick {
            width: 50px; height: 50px;
            background: #ec4899; border-radius: 50%;
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4);
            border: 3px solid white; transform: translate(0,0);
        }

        /* Aksiyon Butonu */
        #action-btn {
            position: absolute; bottom: 40px; right: 30px;
            width: 80px; height: 80px;
            background: #f43f5e; color: white; border-radius: 50%;
            display: none; justify-content: center; align-items: center;
            font-weight: bold; font-size: 14px; border: 4px solid white;
            box-shadow: 0 8px 20px rgba(244, 63, 94, 0.4); transition: transform 0.1s;
        }
        #action-btn:active { transform: scale(0.9); }

        /* Gece Modu */
        #night-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1e1b4b; opacity: 0; pointer-events: none;
            transition: opacity 1.5s ease; z-index: 50; mix-blend-mode: multiply;
        }

        /* Yükleme Ekranı (Siyah ekran yerine pembe yükleme) */
        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fbcfe8; z-index: 999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s;
        }

        /* Uygulama Yükle Butonu */
        #install-btn {
            position: absolute; top: 80px; right: 15px;
            background: #10b981; color: white; padding: 8px 15px;
            border-radius: 20px; font-weight: bold; font-size: 12px;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); display: none;
            animation: bounce 2s infinite; z-index: 101;
        }
        @keyframes bounce { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-5px);} }

    </style>
</head>
<body>

    <!-- Yükleme Ekranı -->
    <div id="loading">
        <div class="text-6xl animate-bounce mb-4">🦄</div>
        <div class="text-pink-600 font-bold text-xl">Oyun Yükleniyor...</div>
    </div>

    <!-- Uygulama Yükle Butonu (Ana Ekrana Ekle) -->
    <button id="install-btn" class="ui-element flex items-center gap-1">
        <span>📱</span> Ana Ekrana Ekle
    </button>

    <!-- Oyun Alanı -->
    <div id="gameArea">
        <div class="floor-grid"></div>
        
        <!-- Etkileşimli Nesneler -->
        <div id="obj-yatak" class="sprite" style="left: 20%; top: 30%;">
            <div class="emoji-art" style="font-size: 80px;">🛏️</div>
            <div class="shadow"></div>
        </div>
        
        <div id="obj-masa" class="sprite" style="left: 80%; top: 40%;">
            <div class="emoji-art" style="font-size: 70px;">🍓</div>
            <div class="shadow"></div>
        </div>

        <div id="obj-kuvet" class="sprite" style="left: 20%; top: 70%;">
            <div class="emoji-art" style="font-size: 70px;">🛁</div>
            <div class="shadow"></div>
        </div>

        <div id="obj-tuvalet" class="sprite" style="left: 80%; top: 75%;">
            <div class="emoji-art" style="font-size: 60px;">🚽</div>
            <div class="shadow"></div>
        </div>

        <!-- Kardeşler -->
        <div id="sib1" class="sprite" style="left: 50%; top: 20%; transform: scale(0.7) translate(-50%, -100%);">
            <div class="emoji-art">🦄</div><div class="shadow"></div>
        </div>
        <div id="sib2" class="sprite" style="left: 60%; top: 80%; transform: scale(0.6) translate(-50%, -100%);">
            <div class="emoji-art">🦄</div><div class="shadow"></div>
        </div>

        <!-- Ana Karakter -->
        <div id="player" class="sprite" style="left: 50%; top: 50%; z-index: 20;">
            <div class="absolute -top-10 text-3xl" id="player-acc"></div> <!-- Aksesuar -->
            <div class="emoji-art" id="player-emoji">🦄</div>
            <div class="shadow"></div>
        </div>
    </div>

    <div id="night-overlay"></div>

    <!-- Arayüz -->
    <div id="ui-layer">
        
        <div class="flex justify-between items-start pointer-events-none">
            <!-- Durumlar -->
            <div class="glass-box p-3 w-40 md:w-52 ui-element">
                <div class="text-xs font-black text-pink-600 mb-2">Durumlar</div>
                <div class="space-y-1">
                    <div class="flex items-center text-[10px] font-bold"><span class="w-5">🍓</span><div class="flex-1 bg-gray-200 h-2 rounded-full"><div id="bar-tokluk" class="bg-green-400 h-full rounded-full transition-all" style="width: 80%"></div></div></div>
                    <div class="flex items-center text-[10px] font-bold"><span class="w-5">🚽</span><div class="flex-1 bg-gray-200 h-2 rounded-full"><div id="bar-tuvalet" class="bg-green-400 h-full rounded-full transition-all" style="width: 90%"></div></div></div>
                    <div class="flex items-center text-[10px] font-bold"><span class="w-5">⚡</span><div class="flex-1 bg-gray-200 h-2 rounded-full"><div id="bar-enerji" class="bg-yellow-400 h-full rounded-full transition-all" style="width: 70%"></div></div></div>
                    <div class="flex items-center text-[10px] font-bold"><span class="w-5">🎈</span><div class="flex-1 bg-gray-200 h-2 rounded-full"><div id="bar-eglence" class="bg-green-400 h-full rounded-full transition-all" style="width: 80%"></div></div></div>
                    <div class="flex items-center text-[10px] font-bold"><span class="w-5">🛁</span><div class="flex-1 bg-gray-200 h-2 rounded-full"><div id="bar-temizlik" class="bg-green-400 h-full rounded-full transition-all" style="width: 90%"></div></div></div>
                </div>
            </div>

            <div class="flex flex-col items-end gap-2">
                <div class="glass-box text-pink-600 px-3 py-1 font-black text-lg flex items-center ui-element">
                    <span id="loli-count">0</span>🍭
                </div>
                <div id="msg-box" class="glass-box text-pink-600 px-3 py-1 font-bold text-xs opacity-0 transition-opacity text-right">
                    Oyun Başladı!
                </div>
            </div>
        </div>

        <!-- Üst Menü -->
        <div class="absolute top-5 left-1/2 -translate-x-1/2 flex gap-2 ui-element">
            <button onclick="playAction()" class="glass-box px-3 py-1.5 text-pink-600 font-bold text-sm">🎈 Oyna</button>
            <div class="relative">
                <button onclick="document.getElementById('dress-menu').classList.toggle('hidden')" class="glass-box px-3 py-1.5 text-purple-600 font-bold text-sm">🎀 Giy</button>
                <div id="dress-menu" class="hidden absolute top-full mt-2 left-1/2 -translate-x-1/2 glass-box p-1 flex gap-1">
                    <button onclick="setAcc('')" class="text-xl p-1">❌</button>
                    <button onclick="setAcc('👑')" class="text-xl p-1">👑</button>
                    <button onclick="setAcc('🕶️')" class="text-xl p-1">🕶️</button>
                </div>
            </div>
        </div>

        <!-- Kontroller -->
        <div class="relative h-32 w-full">
            <div id="joy-base" class="ui-element"><div id="joy-stick"></div></div>
            <button id="action-btn" class="ui-element" onclick="doAction()">Eylem</button>
        </div>
    </div>

    <script>
        // PWA Kurulumu (Uygulama Olarak Ekleme)
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex'; // Butonu göster
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // --- OYUN DEĞİŞKENLERİ ---
        const player = document.getElementById('player');
        const gameArea = document.getElementById('gameArea');
        const actionBtn = document.getElementById('action-btn');
        let lollipops = 0;
        let isSleeping = false;
        let pX = 50, pY = 50; // Yüzde cinsinden pozisyon
        let activeObj = null;
        let msgTimeout;

        let stats = { tokluk: 80, tuvalet: 90, enerji: 70, eglence: 80, temizlik: 90 };

        // Nesne Tanımları
        const objects = [
            { id: 'obj-yatak', x: 20, y: 30, action: 'uyut', label: 'Uyu', loli: 8, msg: 'İyi geceler...' },
            { id: 'obj-masa', x: 80, y: 40, action: 'besle', label: 'Yemek', loli: 5, msg: 'Nefis! +5🍭' },
            { id: 'obj-kuvet', x: 20, y: 70, action: 'yika', label: 'Yıkan', loli: 5, msg: 'Mis gibi! +5🍭' },
            { id: 'obj-tuvalet', x: 80, y: 75, action: 'tuvalet', label: 'Tuvalet', loli: 3, msg: 'Rahatladı! +3🍭' }
        ];

        // --- YÜKLEME EKRANINI KALDIR ---
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
            }, 1000);
        };

        // --- JOYSTICK KONTROLLERİ ---
        const joyBase = document.getElementById('joy-base');
        const joyStick = document.getElementById('joy-stick');
        let joyActive = false;
        let joyCenter = {x:0, y:0};
        let input = {x:0, y:0};

        function startJoy(e) {
            e.preventDefault();
            const rect = joyBase.getBoundingClientRect();
            joyCenter = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
            joyActive = true;
            moveJoy(e);
        }

        function moveJoy(e) {
            if(!joyActive) return;
            e.preventDefault();
            const touch = e.touches ? e.touches[0] : e;
            let dx = touch.clientX - joyCenter.x;
            let dy = touch.clientY - joyCenter.y;
            const dist = Math.hypot(dx, dy);
            const maxR = 35;
            
            if(dist > maxR) { dx = (dx/dist)*maxR; dy = (dy/dist)*maxR; }
            
            joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
            input.x = dx / maxR;
            input.y = dy / maxR;
        }

        function endJoy() {
            joyActive = false;
            input = {x:0, y:0};
            joyStick.style.transform = `translate(0px, 0px)`;
            player.classList.remove('walking');
        }

        joyBase.addEventListener('touchstart', startJoy, {passive: false});
        window.addEventListener('touchmove', moveJoy, {passive: false});
        window.addEventListener('touchend', endJoy);
        
        // Mouse desteği (Bilgisayardan denemek için)
        joyBase.addEventListener('mousedown', startJoy);
        window.addEventListener('mousemove', moveJoy);
        window.addEventListener('mouseup', endJoy);


        // --- OYUN DÖNGÜSÜ ---
        function gameLoop() {
            if(!isSleeping && (Math.abs(input.x) > 0.1 || Math.abs(input.y) > 0.1)) {
                player.classList.add('walking');
                
                // Hız (Ekranın en-boy oranına göre ayarlandı)
                pX += input.x * 0.8;
                pY += input.y * 1.2;

                // Sınırlar
                pX = Math.max(5, Math.min(95, pX));
                pY = Math.max(20, Math.min(90, pY));

                player.style.left = `${pX}%`;
                player.style.top = `${pY}%`;

                // Yönüne göre dönme (Flip)
                const emoji = document.getElementById('player-emoji');
                if(input.x > 0) emoji.style.transform = "scaleX(-1)";
                else if (input.x < 0) emoji.style.transform = "scaleX(1)";
            }

            // Etkileşim Kontrolü
            let found = null;
            if(!isSleeping) {
                for(let obj of objects) {
                    // Yüzdelik mesafe ölçümü
                    let dist = Math.hypot(pX - obj.x, pY - obj.y);
                    if(dist < 15) { found = obj; break; }
                }
            } else {
                found = objects[0]; // Uyurken sadece yatak aktif
            }

            if(found) {
                if(activeObj !== found || actionBtn.style.display === 'none') {
                    activeObj = found;
                    actionBtn.innerText = isSleeping ? "Uyan" : found.label;
                    actionBtn.style.display = 'flex';
                }
            } else {
                activeObj = null;
                actionBtn.style.display = 'none';
            }

            // Z-Index Ayarı (Öndeki nesne üstte görünür)
            player.style.zIndex = Math.floor(pY);
            
            requestAnimationFrame(gameLoop);
        }
        
        requestAnimationFrame(gameLoop);


        // --- AKSİYONLAR VE UI ---
        function showMsg(txt) {
            const el = document.getElementById('msg-box');
            el.innerText = txt;
            el.style.opacity = '1';
            clearTimeout(msgTimeout);
            msgTimeout = setTimeout(() => el.style.opacity = '0', 2000);
        }

        function updateUI() {
            const c = v => v > 60 ? "#4ade80" : (v > 30 ? "#facc15" : "#f87171");
            ['tokluk', 'tuvalet', 'enerji', 'eglence', 'temizlik'].forEach(k => {
                let bar = document.getElementById(`bar-${k}`);
                bar.style.width = `${stats[k]}%`;
                bar.style.backgroundColor = c(stats[k]);
            });
            document.getElementById('loli-count').innerText = lollipops;
        }

        window.doAction = () => {
            if(!activeObj) return;
            const act = activeObj;

            if(act.action === 'uyut') {
                isSleeping = !isSleeping;
                const overlay = document.getElementById('night-overlay');
                if(isSleeping) {
                    overlay.style.opacity = '0.8';
                    player.classList.add('sleeping');
                    stats.enerji = 100;
                    lollipops += act.loli;
                    showMsg(act.msg);
                    
                    // Yatağa hizala
                    pX = act.x; pY = act.y;
                    player.style.left = `${pX}%`; player.style.top = `${pY}%`;
                } else {
                    overlay.style.opacity = '0';
                    player.classList.remove('sleeping');
                    showMsg("Günaydın!");
                }
            } else {
                if(isSleeping) { showMsg("Önce uyan!"); return; }
                
                // Zıplama Efekti
                const art = document.getElementById('player-emoji');
                art.style.transform = "translateY(-30px)";
                setTimeout(()=> art.style.transform = "translateY(0)", 200);

                if(act.action === 'besle') {
                    if(stats.tokluk>=100){ showMsg("Tok."); return;}
                    stats.tokluk = Math.min(100, stats.tokluk+40);
                    stats.tuvalet = Math.max(0, stats.tuvalet-20);
                } else if(act.action === 'tuvalet') {
                    stats.tuvalet = 100; stats.temizlik -= 10;
                } else if(act.action === 'yika') {
                    stats.temizlik = 100;
                }
                lollipops += act.loli;
                showMsg(act.msg);
            }
            updateUI();
        };

        window.playAction = () => {
            if(isSleeping) { showMsg("Uyuyor."); return; }
            if(stats.enerji < 20) { showMsg("Çok yorgun."); return; }
            
            stats.eglence = Math.min(100, stats.eglence + 40);
            stats.enerji = Math.max(0, stats.enerji - 25);
            lollipops += 10;
            showMsg("Kardeşleriyle oynadı! +10🍭");
            updateUI();
            
            const art = document.getElementById('player-emoji');
            art.style.transform = "translateY(-50px) scale(1.2)";
            setTimeout(()=> art.style.transform = "translateY(0) scale(1)", 300);
        };

        window.setAcc = (acc) => {
            if(isSleeping) return;
            document.getElementById('player-acc').innerText = acc;
            document.getElementById('dress-menu').classList.add('hidden');
            if(acc) { lollipops += 2; showMsg("+2🍭 Yakıştı!"); updateUI(); }
        };

        // Otomatik İhtiyaç Düşüşü
        setInterval(() => {
            if(isSleeping) return;
            stats.tokluk = Math.max(0, stats.tokluk - 2);
            stats.tuvalet = Math.max(0, stats.tuvalet - 1);
            stats.enerji = Math.max(0, stats.enerji - 1);
            stats.eglence = Math.max(0, stats.eglence - 2);
            stats.temizlik = Math.max(0, stats.temizlik - 1);
            updateUI();
            
            // Kardeşleri rastgele hareket ettir
            ['sib1', 'sib2'].forEach(id => {
                if(Math.random() > 0.5) {
                    const el = document.getElementById(id);
                    let currX = parseFloat(el.style.left);
                    let currY = parseFloat(el.style.top);
                    el.style.left = `${Math.max(10, Math.min(90, currX + (Math.random()*10-5)))}%`;
                    el.style.top = `${Math.max(20, Math.min(90, currY + (Math.random()*10-5)))}%`;
                }
            });

        }, 4000);

        updateUI();

    </script>
</body>
</html>
